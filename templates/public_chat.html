<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat with {{ company.username }} - VoiceAI Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white font-sans min-h-screen"
  >
    {% if error %}
    <!-- Error State -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center max-w-md">
        <div class="text-6xl mb-4">🔒</div>
        <h1 class="text-3xl font-bold mb-4">Chatbot Offline</h1>
        <p class="text-slate-400 mb-6">{{ error }}</p>
        <a
          href="/"
          class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg transition"
        >
          Return Home
        </a>
      </div>
    </div>
    {% else %}
    <!-- Chat Interface -->
    <div class="flex flex-col h-screen">
      <!-- Header -->
      <div
        class="bg-slate-800 border-b border-slate-700 shadow-lg sticky top-0 z-10"
      >
        <div
          class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center"
        >
          <div>
            <h1 class="text-2xl font-bold text-blue-400">
              {{ bot_config.bot_name }}
            </h1>
            <p class="text-sm text-slate-400">
              {{ company.username }}'s Support Bot
            </p>
          </div>
          <div class="flex items-center space-x-2">
            <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-sm text-slate-300">Online</span>
          </div>
        </div>
      </div>

      <!-- Chat Area -->
      <div class="flex-1 overflow-y-auto px-4 py-6">
        <div class="max-w-4xl mx-auto space-y-4" id="chatMessages">
          <!-- Welcome Message -->
          <div class="flex justify-start">
            <div
              class="bg-slate-700 rounded-2xl rounded-tl-sm px-6 py-4 max-w-md shadow-lg"
            >
              <p class="text-slate-200">{{ bot_config.welcome_message }}</p>
            </div>
          </div>
          <div class="text-xs text-slate-500 text-center">
            {{ bot_config.bot_name }} is ready to help
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="bg-slate-800 border-t border-slate-700 px-4 py-6">
        <div class="max-w-4xl mx-auto space-y-4">
          <!-- Mode Tabs -->
          <div class="flex space-x-2 mb-4">
            <button
              type="button"
              onclick="switchMode('text')"
              id="textModeBtn"
              class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-blue-600 text-white font-semibold transition"
            >
              <span>💬</span> <span>Text</span>
            </button>
            <button
              type="button"
              onclick="switchMode('voice')"
              id="voiceModeBtn"
              class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-slate-700 text-slate-300 hover:bg-slate-600 font-semibold transition"
            >
              <span>🎤</span> <span>Voice</span>
            </button>
          </div>

          <!-- Text Input -->
          <div id="textMode" class="flex space-x-3">
            <input
              type="text"
              id="messageInput"
              placeholder="Type your message..."
              class="flex-1 bg-slate-700 border border-slate-600 rounded-full px-6 py-3 text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition"
            />
            <button
              type="button"
              onclick="sendTextMessage()"
              class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-full transition flex items-center space-x-2"
            >
              <span>Send</span>
              <span>→</span>
            </button>
          </div>

          <!-- Voice Input -->
          <div
            id="voiceMode"
            class="hidden flex flex-col items-center space-y-4"
          >
            <div class="flex items-center justify-center space-x-4">
              <button
                type="button"
                id="recordBtn"
                onclick="startRecording()"
                class="bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-4 rounded-full transition flex items-center space-x-2 shadow-lg"
              >
                <span>🎤</span> <span>Start Recording</span>
              </button>
              <button
                type="button"
                id="stopBtn"
                onclick="stopRecording()"
                class="hidden bg-red-600 hover:bg-red-700 text-white font-bold px-8 py-4 rounded-full transition flex items-center space-x-2 shadow-lg"
              >
                <span>⏹</span> <span>Stop Recording</span>
              </button>
            </div>
            <div id="recordingStatus" class="text-slate-400 text-sm"></div>
            <p class="text-xs text-slate-500 text-center">
              Your voice will be converted to text and sent automatically
            </p>
          </div>

          <!-- Loading Indicator -->
          <div
            id="loadingIndicator"
            class="hidden flex items-center justify-center space-x-2"
          >
            <div
              class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"
              style="animation-delay: 0s"
            ></div>
            <div
              class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"
              style="animation-delay: 0.2s"
            ></div>
            <div
              class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"
              style="animation-delay: 0.4s"
            ></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      let mediaRecorder;
      let audioChunks = [];
      let isRecording = false;

      const company = "{{ company.username }}";

      function switchMode(mode) {
        if (mode === "text") {
          document.getElementById("textMode").classList.remove("hidden");
          document.getElementById("voiceMode").classList.add("hidden");
          document
            .getElementById("textModeBtn")
            .classList.remove("bg-slate-700");
          document.getElementById("textModeBtn").classList.add("bg-blue-600");
          document
            .getElementById("voiceModeBtn")
            .classList.remove("bg-blue-600");
          document.getElementById("voiceModeBtn").classList.add("bg-slate-700");
        } else {
          document.getElementById("textMode").classList.add("hidden");
          document.getElementById("voiceMode").classList.remove("hidden");
          document
            .getElementById("voiceModeBtn")
            .classList.remove("bg-slate-700");
          document.getElementById("voiceModeBtn").classList.add("bg-blue-600");
          document
            .getElementById("textModeBtn")
            .classList.remove("bg-blue-600");
          document.getElementById("textModeBtn").classList.add("bg-slate-700");
        }
      }

      function addMessageToChat(content, isBot = false) {
        const chatMessages = document.getElementById("chatMessages");
        const messageDiv = document.createElement("div");
        messageDiv.className = `flex ${isBot ? "justify-start" : "justify-end"}`;

        const contentDiv = document.createElement("div");
        contentDiv.className = `rounded-2xl px-6 py-4 max-w-md shadow-lg ${
          isBot ? "bg-slate-700 text-slate-200" : "bg-blue-600 text-white"
        }`;
        contentDiv.textContent = content;

        messageDiv.appendChild(contentDiv);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function showLoading(show) {
        const indicator = document.getElementById("loadingIndicator");
        if (show) {
          indicator.classList.remove("hidden");
        } else {
          indicator.classList.add("hidden");
        }
      }

      function sendTextMessage() {
        const input = document.getElementById("messageInput");
        const message = input.value.trim();

        if (!message) return;

        addMessageToChat(message);
        input.value = "";
        showLoading(true);

        fetch(`/chat/${company}/text/`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        })
          .then((r) => r.json())
          .then((data) => {
            showLoading(false);
            if (data.answer) {
              addMessageToChat(data.answer, true);
            } else if (data.error) {
              addMessageToChat("Error: " + data.error, true);
            }
          })
          .catch((err) => {
            showLoading(false);
            addMessageToChat("Connection error. Please try again.", true);
            console.error(err);
          });
      }

      async function startRecording() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = sendVoiceMessage;

          mediaRecorder.start();
          isRecording = true;

          document.getElementById("recordBtn").classList.add("hidden");
          document.getElementById("stopBtn").classList.remove("hidden");
          document.getElementById("recordingStatus").textContent =
            "🔴 Recording...";
        } catch (error) {
          addMessageToChat(
            "Microphone access denied. Please allow microphone access.",
            true,
          );
          console.error("Microphone error:", error);
        }
      }

      function stopRecording() {
        if (mediaRecorder && isRecording) {
          mediaRecorder.stop();
          isRecording = false;

          document.getElementById("stopBtn").classList.add("hidden");
          document.getElementById("recordBtn").classList.remove("hidden");
          document.getElementById("recordingStatus").textContent =
            "⏳ Processing...";
        }
      }

      function sendVoiceMessage() {
        const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
        const formData = new FormData();
        formData.append("audio", audioBlob, "recording.wav");

        showLoading(true);

        fetch(`/chat/${company}/voice/`, {
          method: "POST",
          body: formData,
        })
          .then((r) => r.json())
          .then((data) => {
            showLoading(false);
            document.getElementById("recordingStatus").textContent = "";

            if (data.transcript) {
              addMessageToChat(data.transcript);
            }
            if (data.answer) {
              addMessageToChat(data.answer, true);
            } else if (data.error) {
              addMessageToChat("Error: " + data.error, true);
            }
          })
          .catch((err) => {
            showLoading(false);
            document.getElementById("recordingStatus").textContent = "";
            addMessageToChat("Connection error. Please try again.", true);
            console.error(err);
          });
      }

      // Allow Enter key to send message
      document
        .getElementById("messageInput")
        ?.addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendTextMessage();
          }
        });
    </script>
    {% endif %}
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - VoiceAI Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white font-sans min-h-screen flex items-center justify-center"
  >
    <div class="w-full max-w-md">
      <!-- Logo Section -->
      <div class="text-center mb-10">
        <div class="text-4xl font-bold text-blue-500 mb-2">VoiceAI</div>
        <p class="text-slate-400">Customer Support Platform</p>
      </div>

      <!-- Login Form -->
      <div
        class="bg-slate-800 rounded-2xl shadow-2xl shadow-blue-900/20 p-8 border border-slate-700"
      >
        <h1 class="text-3xl font-bold mb-8 text-center">Login</h1>

        {% if error %}
        <div
          class="bg-red-900/30 border border-red-700 text-red-200 px-4 py-3 rounded-lg mb-6"
        >
          {{ error }}
        </div>
        {% endif %}

        <form method="post" class="space-y-5">
          {% csrf_token %}

          <!-- Username Field -->
          <div>
            <label
              for="username"
              class="block text-sm font-semibold text-slate-300 mb-2"
            >
              Username
            </label>
            <input
              type="text"
              id="username"
              name="username"
              required
              class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition"
              placeholder="Enter your username"
            />
          </div>

          <!-- Password Field -->
          <div>
            <label
              for="password"
              class="block text-sm font-semibold text-slate-300 mb-2"
            >
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition"
              placeholder="Enter your password"
            />
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 shadow-lg shadow-blue-500/30 mt-8"
          >
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-600"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-slate-800 text-slate-400">or</span>
          </div>
        </div>

        <!-- Signup Link -->
        <div class="text-center">
          <p class="text-slate-400 mb-4">Don't have an account?</p>
          <a
            href="{% url 'signup' %}"
            class="inline-block w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-lg transition border border-slate-600 hover:border-slate-500"
          >
            Create Account
          </a>
        </div>

        <!-- Back to Home -->
        <div class="mt-6 text-center">
          <a
            href="{% url 'landing' %}"
            class="text-blue-400 hover:text-blue-300 text-sm transition"
          >
            ← Back to Home
          </a>
        </div>
      </div>

      <!-- Footer Info -->
      <div class="mt-8 text-center text-slate-500 text-sm">
        <p>For companies only. Customers should use the public chat links.</p>
      </div>
    </div>
  </body>
</html>
